# Tally Nginx 安全配置
# 针对公网 80 端口部署，防护扫描和恶意请求

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 512;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ===== 日志格式（记录真实 IP 和响应时间） =====
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" rt=$request_time';
    access_log /var/log/nginx/access.log main;

    # ===== 基础安全设置 =====
    server_tokens off;                          # 隐藏 Nginx 版本号
    client_body_timeout 10s;                    # 请求体超时
    client_header_timeout 10s;                  # 请求头超时
    send_timeout 10s;                           # 发送超时
    client_max_body_size 512k;                  # 限制上传大小
    keepalive_timeout 30s;                      # 长连接超时

    # ===== 连接限制 =====
    limit_conn_zone $binary_remote_addr zone=conn_limit:5m;
    limit_conn conn_limit 5;                    # 单 IP 最多 5 并发连接

    # ===== 请求限流（小用户数配置）=====
    # API 限流：5r/s，突发 10
    limit_req_zone $binary_remote_addr zone=api_limit:5m rate=5r/s;
    # 聊天限流：3r/m（AI 调用成本高，防滥用）
    limit_req_zone $binary_remote_addr zone=chat_limit:5m rate=3r/m;

    # ===== 拦截扫描和恶意请求 =====

    # 拒绝无 User-Agent 的请求（大部分扫描器无 UA）
    map $http_user_agent $bad_ua {
        default 0;
        "" 1;                                   # 空 UA
        ~*(scanner|nikto|nmap|sqlmap|burp|zap|gobuster|dirbuster) 1;
        ~*(masscan|zgrab|censys|shodan) 1;      # 互联网扫描器
    }

    # 拒绝无 Host 头的请求
    map $http_host $bad_host {
        default 0;
        "" 1;
    }

    server {
        listen 80;
        server_name _;                          # 默认服务器

        # ===== 第一层：基础安全检查 =====
        if ($bad_host) { return 444; }          # 无 Host 直接断开
        if ($bad_ua) { return 403; }            # 恶意 UA 返回 403

        # ===== 第二层：拦截常见扫描路径 =====
        # 这些路径返回 404，不记录日志（避免日志爆炸）
        location ~* ^/(admin|phpmyadmin|wp-login|wp-admin|config|\.env|\.git|\.htaccess|robots\.txt|sitemap\.xml|favicon\.ico) {
            access_log off;
            return 404;
        }

        # 拦截路径遍历尝试
        location ~* \.(bak|backup|swp|old|orig|save|sql|log)$ {
            access_log off;
            return 404;
        }

        # ===== 第三层：只允许 Tally API =====

        # 健康检查（宽松限流）
        location /api/health {
            limit_req zone=api_limit burst=10 nodelay;
            proxy_pass http://backend:3000;
            proxy_buffering off;
            proxy_read_timeout 30s;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # 聊天接口（严格限流，SSE 支持）
        location /api/chat {
            limit_req zone=chat_limit burst=3 nodelay;  # 3r/m，突发 3
            proxy_pass http://backend:3000;
            proxy_buffering off;                        # SSE 流式关键
            proxy_read_timeout 300s;                    # AI 响应时间长
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # 其他 API 路径（统一处理）
        location /api/ {
            limit_req zone=api_limit burst=10 nodelay;
            proxy_pass http://backend:3000;
            proxy_buffering off;
            proxy_read_timeout 60s;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # 其他所有路径 404
        location / {
            access_log off;
            return 404;
        }
    }
}
