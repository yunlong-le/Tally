version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: tally-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-tally}
      POSTGRES_USER: ${POSTGRES_USER:-tally}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tally}"]
      interval: 5s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - tally-network

  backend:
    build: .
    container_name: tally-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-tally}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-tally}
      KIMI_API_KEY: ${KIMI_API_KEY}
      TAVILY_API_KEY: ${TAVILY_API_KEY}
      PORT: 3000
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - tally-network

  nginx:
    image: nginx:alpine
    container_name: tally-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - tally-network

networks:
  tally-network:
    driver: bridge

volumes:
  postgres_data:
